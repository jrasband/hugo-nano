{{ define "main" }}
<div class="container">
  <div class="page-sections">
    <h1 class="animate font-semibold text-black-white">
      Projects
    </h1>
    <ul class="animate post-list">
      {{ $projects := (where .Pages "Params.draft" "!=" true).ByDate.Reverse }}
      {{ range $projects }}
        <li>
          {{ partial "arrowcard.html" . }}
        </li>
      {{ end }}
    </ul>
  </div>
</div>
{{ end }}
