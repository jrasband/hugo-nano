<a href="{{ .href }}" class="btn-back">

    xmlns="http://www.w3.org/2000/svg" 
    viewBox="0 0 24 24"
    class="btn-back-icon">
    <line x1="5" y1="12" x2="19" y2="12" class="btn-back-line" />
    <polyline points="12 5 5 12 12 19" class="btn-back-arrow" />
  </svg>
  <div class="text-sm">
    {{ .text }}
  </div>
</a>
