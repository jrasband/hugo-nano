<a href="{{ .RelPermalink }}" class="arrow-card">
  <div class="arrow-card-content">
    <div class="arrow-card-title">
      {{ .Title }}
    </div>
    <div class="arrow-card-desc">
      {{ .Description }}
    </div>
  </div>
  <svg 
    xmlns="http://www.w3.org/2000/svg" 
    viewBox="0 0 24 24"
    class="arrow-card-icon">
    <line x1="5" y1="12" x2="19" y2="12" class="arrow-card-line" />
    <polyline points="12 5 19 12 12 19" class="arrow-card-arrow" />
  </svg>
</a>
